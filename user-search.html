<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felhasználó keresés</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
nav a { margin-right: 15px; }
.user { margin-top: 10px; display: flex; align-items: center; }
.user img { width: 50px; height: 50px; border-radius: 50%; margin-right: 10px; }
</style>
</head>
<body>

<!-- Menü -->
<nav>
<a href="index.html">Főoldal</a>
<a href="user-search.html">Felhasználó keresés</a>
</nav>

<h1>GitHub felhasználó kereső</h1>

<input type="text" id="searchInput" placeholder="Add meg a felhasználónevet">
<button onclick="searchUser()">Keresés</button>

<div id="results"></div>

<script>
async function searchUser() {
const query = document.getElementById('searchInput').value.trim();

if (query === "") {
alert("A keresési mező nem lehet üres!");
return;
}

try {
const response = await fetch(`https://api.github.com/search/users?q=${query}`);
const data = await response.json();

const resultsDiv = document.getElementById('results');
resultsDiv.innerHTML = "";

data.items.forEach(user => {
const userDiv = document.createElement('div');
userDiv.className = 'user';

const img = document.createElement('img');
img.src = user.avatar_url;

const name = document.createElement('span');
name.textContent = user.login;

userDiv.appendChild(img);
userDiv.appendChild(name);

resultsDiv.appendChild(userDiv);
});
} catch (error) {
console.error(error);
alert("Hiba történt a lekérdezés során!");
}
}
</script>

</body>
</html>
