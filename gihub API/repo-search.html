<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git App - Felhasználó kereső</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- A navbar.html dinamikusan töltődik be -->

    <h1>GitHub felhasználó keresés</h1>

    <input type="text" id="user-search-input" placeholder="Felhasználónév">
    <button class="btn btn-primary" id="search-btn">Keresés</button>

    <div id="result"></div>

    <script src="app.js"></script>
    <script>
        async function loadUsers(searchText) {
            if (!searchText.trim()) {
                alert('A keresési mező nem lehet üres!');
                return;
            }

            try {
                const res = await fetch('https://api.github.com/search/users?q='
                    + encodeURIComponent(searchText), {
                        headers: {
                            'Authorization': 'Bearer ' + GH_ACCESS_TOKEN
                        }
                    });

                if (!res.ok) {
                    throw Error('Hibás válasz, státuszkód:' + res.status);
                }

                const data = await res.json();

                const resultDiv = document.querySelector('#result');
                resultDiv.innerHTML = '';

                for (const user of data.items) {
                    const userHtml = `
                        <div class="card">
                            <img src="${user.avatar_url}" alt="avatar" width="50">
                            <p>${user.login}</p>
                        </div>
                    `;
                    resultDiv.innerHTML += userHtml;
                }
            } catch (err) {
                console.error(err);
                alert('Hiba történt a keresés során.');
            }
        }

        const searchBtn = document.querySelector('#search-btn');
        searchBtn.addEventListener('click', () => {
            const inputElem = document.querySelector('#user-search-input');
            const searchText = inputElem.value;

            loadUsers(searchText);
        });
    </script>
</body>
</html>
